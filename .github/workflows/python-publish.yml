# This workflow will upload a Python Package using Twine when a release is created
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python#publishing-to-package-registries

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Uploading Python Package
run-name: ${{ github.actor }} is Publishing to Pypi

on:
  workflow_dispatch: # Se dispara manualmente

permissions:
  contents: read

jobs:
  publish:
    name: Publish packages to PyPI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies for packaging
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install setuptools wheel twine

      - name: Build and upload client package
        working-directory: ./client
        env:
          TWINE_USERNAME: "__token__"
          TWINE_PASSWORD: ${{ secrets.APITOKENWDB }}
        run: |
          python3 setup.py sdist
          twine upload dist/*

      - name: Build and upload server package
        working-directory: ./server
        env:
          TWINE_USERNAME: "__token__"
          TWINE_PASSWORD: ${{ secrets.APITOKENWDB }}
        run: |
          python3 setup.py sdist 
          twine upload dist/*