# This workflow will upload a Python Package using Twine when a release is created
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python#publishing-to-package-registries

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Uploading Python Package
run-name: ${{ github.actor }} is Uploading Python Package

on:
  workflow_dispatch: # Se dispara manualmente
  release:
    types: [published]

permissions:
  contents: read

jobs:
  deploy:

    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

  # Build and publish the server package
    - name: Set up Python for Server
      uses: actions/setup-python@v5.20
      with:
        python-version: '3.12'

    - name: Install dependencies for Server
      run: |
        cd server
        python -m pip install --upgrade pip
        pip install build

    - name: Build Server Package
      run: |
        cd server
        python -m build

    - name: Publish Server package
      uses: pypa/gh-action-pypi-publish@v1.10.3
      with:
        user: __token__
        password: ${{ secrets.PYPI_API_TOKEN }}
        working-directory: server

   # Build and publish the client package
    - name: Set up Python for Client
      uses: actions/setup-python@v5.20
      with:
        python-version: '3.12'

    - name: Install dependencies for Client
      run: |
        cd client
        python -m pip install --upgrade pip
        pip install build

    - name: Build Client package
      run: |
        cd client
        python -m build

    - name: Publish Client package
      uses: pypa/gh-action-pypi-publish@vv1.10.3
      with:
        user: __token__
        password: ${{ secrets.PYPI_API_TOKEN }}
        working-directory: client
